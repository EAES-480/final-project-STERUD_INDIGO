``` r
set.seed(100)
bootstrap_state &lt;- mining_clean %&gt;%
  group_by(state_abbr) %&gt;%
  summarize(
    boot_median = list(
      replicate(1000,
        median(sample(Calc_Vol, replace = TRUE), na.rm = TRUE)
      )
    )
  )

bootstrap_ci &lt;- bootstrap_state %&gt;%
  mutate(
    median_est = map_dbl(boot_median, median),
    lower = map_dbl(boot_median, ~quantile(.x, 0.025)),
    upper = map_dbl(boot_median, ~quantile(.x, 0.975))
  )

ggplot(bootstrap_ci,
       aes(x = reorder(state_abbr, median_est),
           y = median_est)) +
  geom_col(fill = "steelblue") +
  geom_errorbar(aes(ymin = lower, ymax = upper),
                width = 0.2) +
  theme_bw(base_size = 12) +
  labs(
    title = "Bootstrapped Median Mine Waste Volume by State",
    x = "State",
    y = "Median Volume"
  )
```

&lt;img src="presentation_files/figure-html/state-waste-bootstrap-1.png" alt="" width="80%" /&gt;

## What's going on in Colorado?

- Colorado has only 17 records compared to a state such as AZ that has 751 records. Of these records, most mines are very small (0E00), however some others are extremely large (2E08).


``` r
mining_colorado &lt;- mining_clean %&gt;%
  filter(state_abbr == "CO")

ggplot(mining_colorado, aes(x = Calc_Vol)) +
  geom_histogram(fill = "steelblue", bins = 20) +
  theme_bw(base_size = 12) +
  labs(
    title = "Bootstrap Distribution of Median Mine Waste Volume (Colorado)",
    x = "Median Volume (Bootstrap Samples)",
    y = "Frequency"
  )
```
